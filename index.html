<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>돌봄매트 시공 스케줄러</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--bg2:#111118;--bg3:#1a1a24;--card:#15151e;--border:rgba(255,255,255,.06);--text:#eaeaf2;--text2:#7e7e96;--blue:#5b8def;--green:#34d399;--red:#f87171;--yellow:#fbbf24;--pink:#f472b6;--purple:#a78bfa;--orange:#fb923c;--cyan:#22d3ee;--font:'Noto Sans KR',-apple-system,sans-serif}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;max-width:900px;margin:0 auto}
.hd{background:var(--bg2);border-bottom:1px solid var(--border);padding:14px 16px;position:sticky;top:0;z-index:100}
.hd h1{font-size:16px;font-weight:700}.hd p{font-size:11px;color:var(--text2);margin-top:2px}
.tabs{display:flex;background:var(--bg2);border-bottom:1px solid var(--border)}.tab{flex:1;padding:11px 4px;text-align:center;font-size:11px;font-weight:600;color:var(--text2);border:none;background:none;cursor:pointer;border-bottom:2px solid transparent;font-family:var(--font)}.tab.on{color:var(--blue);border-bottom-color:var(--blue)}
.pane{display:none;padding:12px}.pane.on{display:block}
/* calendar */
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.cal-nav button{padding:8px 14px;background:var(--bg3);border:1px solid var(--border);color:var(--text);border-radius:8px;font-size:16px;cursor:pointer;font-family:var(--font)}
.cal-nav span{font-size:16px;font-weight:900}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:var(--border);border-radius:10px;overflow:hidden}
.cal-hdr{background:var(--bg3);padding:8px 2px;text-align:center;font-size:11px;font-weight:700;color:var(--text2)}
.cal-hdr:first-child{color:var(--red)}.cal-hdr:last-child{color:var(--blue)}
.cal-cell{background:var(--bg2);min-height:90px;padding:4px;font-size:10px;vertical-align:top;position:relative}
.cal-cell.empty{background:var(--bg);opacity:.3}
.cal-cell.today{box-shadow:inset 0 0 0 2px var(--blue)}
.cal-day{font-size:12px;font-weight:700;margin-bottom:3px;padding:1px 4px}
.cal-day.sun{color:var(--red)}.cal-day.sat{color:var(--blue)}
.cal-job{padding:2px 4px;margin:1px 0;border-radius:4px;font-size:9px;line-height:1.4;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer}
.cal-job.t0{background:rgba(91,141,239,.2);color:var(--blue)}
.cal-job.t1{background:rgba(52,211,153,.2);color:var(--green)}
.cal-job.t2{background:rgba(251,191,36,.2);color:var(--yellow)}
.cal-job.t3{background:rgba(244,114,182,.2);color:var(--pink)}
.cal-job.un{background:rgba(248,113,113,.15);color:var(--red);border:1px dashed rgba(248,113,113,.3)}
.cal-off{font-size:8px;color:var(--red);padding:1px 3px}
/* list view */
.day-card{background:var(--card);border-radius:12px;padding:14px;margin-bottom:10px;border:1px solid var(--border)}
.day-hdr{display:flex;justify-content:space-between;align-items:center;padding-bottom:8px;margin-bottom:8px;border-bottom:1px solid var(--border)}
.day-dt{font-size:15px;font-weight:900;color:var(--blue)}.day-dw{font-size:12px;font-weight:700;padding:3px 10px;border-radius:6px;background:rgba(91,141,239,.12);color:var(--blue)}
.tm{background:var(--bg3);border-radius:8px;padding:10px;margin-bottom:6px}
.tm-name{display:inline-block;padding:3px 12px;border-radius:6px;font-size:13px;font-weight:700;margin-bottom:6px}
.tm-job{font-size:12px;color:var(--text2);line-height:1.8;padding:2px 0}
.badge{display:inline-block;padding:1px 7px;border-radius:4px;font-size:10px;font-weight:700;margin:0 2px}
.badge.am{background:rgba(251,191,36,.15);color:var(--yellow)}.badge.pm{background:rgba(167,139,250,.15);color:var(--purple)}
.badge.marble{background:rgba(91,141,239,.15);color:var(--blue)}.badge.cotton{background:rgba(52,211,153,.15);color:var(--green)}.badge.modern{background:rgba(248,113,113,.15);color:var(--red)}
.badge.km{background:rgba(251,191,36,.1);color:var(--yellow)}
.badge.off{background:rgba(248,113,113,.1);color:var(--red)}
.un-box{border:1px dashed rgba(251,191,36,.3);border-radius:8px;padding:10px;margin-bottom:6px}
.un-title{font-size:12px;color:var(--yellow);font-weight:700;margin-bottom:6px}
.ebtn{padding:5px 12px;border-radius:6px;font-size:11px;font-weight:600;border:1px solid var(--border);background:var(--bg);color:var(--text);cursor:pointer;font-family:var(--font);margin:2px}.ebtn:active{transform:scale(.95)}.ebtn.off{opacity:.3;text-decoration:line-through;pointer-events:none}
/* team setup */
.team-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:12px}
.team-title{font-size:14px;font-weight:700;margin-bottom:10px}
.member-pool{display:flex;flex-wrap:wrap;gap:8px;margin:10px 0}
.member{padding:8px 16px;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;border:2px solid transparent;transition:all .15s}
.member:active{transform:scale(.95)}
.member.sel{border-color:#fff;box-shadow:0 0 12px rgba(255,255,255,.2)}
.team-slot{min-height:48px;background:var(--bg3);border-radius:10px;padding:10px;margin:8px 0;display:flex;flex-wrap:wrap;gap:6px;align-items:center}
.team-slot-member{padding:6px 14px;border-radius:8px;font-size:13px;font-weight:700;display:flex;align-items:center;gap:6px}
.team-slot-member .x{width:18px;height:18px;border-radius:50%;background:rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;font-size:12px;cursor:pointer}
.btn{padding:12px 20px;border-radius:10px;font-size:14px;font-weight:700;border:none;cursor:pointer;font-family:var(--font);width:100%}
.btn:active{transform:scale(.98)}
.btn-blue{background:var(--blue);color:#fff}
.btn-green{background:var(--green);color:#000}
.btn-red{background:var(--red);color:#fff}
/* fair */
.fair-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:12px}
.fair-row{display:flex;align-items:center;gap:8px;margin:6px 0}
.fair-name{min-width:44px;font-size:12px;font-weight:600}
.fair-bar{flex:1;height:20px;background:var(--bg3);border-radius:6px;overflow:hidden}
.fair-fill{height:100%;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#fff;min-width:20px}
.fair-val{min-width:40px;text-align:right;font-size:11px;font-family:monospace;color:var(--text2)}
.score{text-align:center;padding:16px}
.score-num{font-size:48px;font-weight:900}
.score-label{font-size:11px;color:var(--text2)}
.sec-title{font-size:14px;font-weight:700;margin-bottom:10px}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--green);color:#000;padding:10px 24px;border-radius:10px;font-size:13px;font-weight:700;z-index:999;display:none}
.tc0{background:var(--blue);color:#fff}.tc1{background:var(--green);color:#000}.tc2{background:var(--yellow);color:#000}.tc3{background:var(--pink);color:#fff}
.tc0l{background:rgba(91,141,239,.15);color:var(--blue)}.tc1l{background:rgba(52,211,153,.15);color:var(--green)}.tc2l{background:rgba(251,191,36,.15);color:var(--yellow)}.tc3l{background:rgba(244,114,182,.15);color:var(--pink)}
</style>
</head>
<body>
<div class="hd"><h1>🔧 돌봄매트 시공 스케줄러</h1><p id="sub">로딩 중...</p></div>
<div class="tabs">
<div class="tab on" onclick="sw('cal')">📅 캘린더</div>
<div class="tab" onclick="sw('list')">📋 리스트</div>
<div class="tab" onclick="sw('team')">👥 팀설정</div>
<div class="tab" onclick="sw('fair')">⚖️ 공정성</div>
</div>
<div class="pane on" id="p-cal"><div id="calView"></div></div>
<div class="pane" id="p-list"><div id="listView"></div></div>
<div class="pane" id="p-team"><div id="teamView"></div></div>
<div class="pane" id="p-fair"><div id="fairView"></div></div>
<div class="toast" id="toast"></div>
<script>
const CSV='https://docs.google.com/spreadsheets/d/1dhcmDkkDGe3Bw4jY3vfPcJGq5H-EGhB3mL4BXqgJiBQ/gviz/tq?tqx=out:csv';
const SYNC='https://script.google.com/macros/s/AKfycbwINWcVy3zrz-OYyasjY0eZzt9oHv6zKqKzC5ZJQ0qc3bTNl0lXwWN1QzpcBu-80lYz-Q/exec';
const MK='AIzaSyAEz2OXudxNoTTn2ueFKWm7KGSnwDW83mw';
const OFF_B={lat:35.1253,lng:128.9736};
const OFF_A={lat:37.3159,lng:126.8233};
const BR=['부산','사상','사하','동래','해운대','연제','남구','북구','서구','중구','동구','금정','강서','기장','김해','양산','울산','창원','경남','경북','대구','마산','진해','밀양','거제','통영','진주','목포','광주','전남','전북','함안'];

let E=JSON.parse(localStorage.getItem('s3_e')||'["준형","윤철","세욱","승재","민석"]');
let teams=JSON.parse(localStorage.getItem('s3_teams')||'[]');
let A={};
let J=[];
let DC=JSON.parse(localStorage.getItem('s3_dc')||'{}');
let calMonth=new Date().getMonth();
let calYear=new Date().getFullYear();

function sv(){localStorage.setItem('s3_e',JSON.stringify(E));localStorage.setItem('s3_teams',JSON.stringify(teams));localStorage.setItem('s3_dc',JSON.stringify(DC))}
function ss(){try{const d=encodeURIComponent(JSON.stringify({A,teams}));new Image().src=SYNC+'?data='+d}catch(e){}}
async function sl(){try{const r=await fetch(SYNC);const t=await r.text();const d=JSON.parse(t);if(d&&typeof d==='object'){if(d.A)A=d.A;if(d.teams){teams=d.teams;sv()}}}catch(e){}}

// 거리
async function geo(addr){if(DC[addr])return DC[addr];try{const r=await fetch('https://maps.googleapis.com/maps/api/geocode/json?address='+encodeURIComponent(addr)+'&key='+MK+'&language=ko');const d=await r.json();if(d.results&&d.results[0]){const l=d.results[0].geometry.location;DC[addr]={lat:l.lat,lng:l.lng};sv();return DC[addr]}}catch(e){}return null}
function hav(a1,n1,a2,n2){const R=6371,x=((a2-a1)*Math.PI/180),y=((n2-n1)*Math.PI/180),z=Math.sin(x/2)**2+Math.cos(a1*Math.PI/180)*Math.cos(a2*Math.PI/180)*Math.sin(y/2)**2;return R*2*Math.atan2(Math.sqrt(z),Math.sqrt(1-z))}
function getOff(addr){return BR.some(r=>addr.includes(r))?OFF_B:OFF_A}

function parseCSV(text){
const lines=text.split('\n');J=[];
for(let i=1;i<lines.length;i++){
const r=[];let cur='',inQ=false;
for(let c=0;c<lines[i].length;c++){const ch=lines[i][c];if(ch==='"'){inQ=!inQ}else if(ch===','&&!inQ){r.push(cur.trim().replace(/^"|"$/g,''));cur=''}else{cur+=ch}}
r.push(cur.trim().replace(/^"|"$/g,''));
if(!r[0]||!r[1])continue;
const doff=[];for(let j=8;j<=13;j++){if(r[j]&&r[j].trim())doff.push(r[j].trim())}
const mat=[];if(r[5]&&parseInt(r[5])>0)mat.push({t:'마블',q:parseInt(r[5])});if(r[6]&&parseInt(r[6])>0)mat.push({t:'코튼',q:parseInt(r[6])});if(r[7]&&parseInt(r[7])>0)mat.push({t:'모던',q:parseInt(r[7])});
let ds=r[1];if(ds.length===8)ds=ds.slice(0,4)+'-'+ds.slice(4,6)+'-'+ds.slice(6,8);
J.push({id:ds+'_'+r[0]+'_'+i,time:r[0],addr:r[2]||'',date:ds,py:r[3]||'',scope:r[4]||'',doff,mat,dist:0})}}

// 팀 찾기
function getTeamIdx(emp){for(let i=0;i<teams.length;i++){if(teams[i].includes(emp))return i}return-1}
function getTeamColor(idx){return idx>=0?idx%4:0}

// 자동 배정
function autoAssign(){
if(!teams.length){toast('👥 팀 설정을 먼저 해주세요');sw('team');return}
const bd={};J.forEach(j=>{if(!bd[j.date])bd[j.date]=[];bd[j.date].push(j)});
// 기존 배정은 유지! 미배정만 새로 배정
const teamDist=teams.map(()=>0);
// 기존 배정된 거리 먼저 계산
J.forEach(j=>{const t=A[j.id];if(t){const ti=teams.findIndex(tm=>tm.some(m=>t.includes(m)));if(ti>=0)teamDist[ti]+=j.dist||0}});
for(const date of Object.keys(bd).sort()){
const dj=bd[date];
const ao=new Set();dj.forEach(j=>j.doff.forEach(n=>ao.add(n)));
const avTeams=teams.map((t,i)=>({idx:i,members:t.filter(m=>!ao.has(m)),full:t})).filter(t=>t.members.length>0);
if(!avTeams.length)continue;
avTeams.sort((a,b)=>teamDist[a.idx]-teamDist[b.idx]);
const am=dj.filter(j=>j.time==='오전'||j.time.includes('2:'));
const pm=dj.filter(j=>j.time==='오후');
function assignSlot(slot){
// 이미 배정된 팀은 사용 중으로 표시
const usedTeams=new Set();
slot.forEach(j=>{if(A[j.id]){const ti=avTeams.findIndex(t=>t.members.some(m=>A[j.id].includes(m)));if(ti>=0)usedTeams.add(ti)}});
const freeTeams=avTeams.filter((t,i)=>!usedTeams.has(i));
let fi=0;
slot.forEach(j=>{
if(!A[j.id]&&fi<freeTeams.length){
A[j.id]=freeTeams[fi].members;
teamDist[freeTeams[fi].idx]+=j.dist||0;
fi++}})}
assignSlot(am);assignSlot(pm)}
ss();toast('✅ 미배정 건 자동 배정 완료!');render()}

function resetAssign(){
if(!confirm('모든 배정을 초기화하고 다시 짤까요?'))return;
A={};autoAssign()}

// ====== 캘린더 ======
function renderCal(){
const dw=['일','월','화','수','목','금','토'];
const first=new Date(calYear,calMonth,1);
const last=new Date(calYear,calMonth+1,0);
const startDay=first.getDay();
const days=last.getDate();
const today=new Date();const todayStr=today.getFullYear()+'-'+String(today.getMonth()+1).padStart(2,'0')+'-'+String(today.getDate()).padStart(2,'0');

const bd={};J.forEach(j=>{if(!bd[j.date])bd[j.date]=[];bd[j.date].push(j)});

let nav=`<div class="cal-nav"><button onclick="calMonth--;if(calMonth<0){calMonth=11;calYear--}render()">◀</button><span>${calYear}년 ${calMonth+1}월</span><button onclick="calMonth++;if(calMonth>11){calMonth=0;calYear++}render()">▶</button></div>`;
nav+=`<div style="display:flex;gap:8px;margin-bottom:12px"><button class="btn btn-blue" onclick="autoAssign()" style="flex:2">🤖 미배정만 자동 배정</button><button class="btn" style="flex:1;background:var(--bg3);color:var(--red);border:1px solid rgba(248,113,113,.3)" onclick="resetAssign()">🔄 전체 초기화</button></div>`;

let grid='<div class="cal-grid">';
dw.forEach(d=>grid+=`<div class="cal-hdr">${d}</div>`);

// 빈 칸
for(let i=0;i<startDay;i++)grid+='<div class="cal-cell empty"></div>';

for(let d=1;d<=days;d++){
const ds=calYear+'-'+String(calMonth+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
const isToday=ds===todayStr;
const dow=new Date(calYear,calMonth,d).getDay();
const dayClass=dow===0?'sun':dow===6?'sat':'';
const jobs=bd[ds]||[];

// 휴무
const offs=new Set();jobs.forEach(j=>j.doff.forEach(n=>offs.add(n)));
const offHtml=offs.size?'<div class="cal-off">'+[...offs].map(n=>n+'휴').join(' ')+'</div>':'';

// 배정된 팀별로 그룹
const teamJobs={};const unassigned=[];
jobs.forEach(j=>{
const t=A[j.id];
if(t){const key=t.join(' ');if(!teamJobs[key])teamJobs[key]={team:t,jobs:[]};teamJobs[key].jobs.push(j)}
else unassigned.push(j)});

let jobsHtml='';
Object.values(teamJobs).forEach(tg=>{
const ti=getTeamIdx(tg.team[0]);const tc=getTeamColor(ti);
tg.jobs.forEach(j=>{
const loc=j.addr?j.addr.replace(/부산|양산|울산|창원|김해|대구|경북|안산|밀양|거제|함안|경기도|광주|목포/g,'').trim():'';
const matStr=j.mat.map(m=>m.t[0]+m.q).join('');
jobsHtml+=`<div class="cal-job t${tc}" title="${j.addr}/${j.scope} ${j.mat.map(m=>m.t+m.q).join(' ')}">${j.time==='오전'||j.time.includes('2:')?'AM':'PM'} ${tg.team.join('·')} ${loc?loc.substring(0,6):''}${matStr?' '+matStr:''}</div>`})});

unassigned.forEach(j=>{
const loc=j.addr?j.addr.replace(/부산|양산|울산|창원|김해|대구|경북|안산|밀양|거제|함안|경기도|광주|목포/g,'').trim():'';
jobsHtml+=`<div class="cal-job un">${j.time==='오전'?'AM':'PM'} ${loc?loc.substring(0,8):'미정'}</div>`});

grid+=`<div class="cal-cell${isToday?' today':''}"><div class="cal-day ${dayClass}">${d}</div>${offHtml}${jobsHtml}</div>`}

// 남은 빈 칸
const remain=7-((startDay+days)%7);
if(remain<7)for(let i=0;i<remain;i++)grid+='<div class="cal-cell empty"></div>';
grid+='</div>';

document.getElementById('calView').innerHTML=nav+grid}

// ====== 리스트 ======
function renderList(){
const bd={};J.forEach(j=>{if(!bd[j.date])bd[j.date]=[];bd[j.date].push(j)});
const dates=Object.keys(bd).sort();
const dw=['일','월','화','수','목','금','토'];

if(!dates.length){document.getElementById('listView').innerHTML='<div style="text-align:center;padding:40px;color:var(--text2)">데이터 없음</div>';return}

document.getElementById('listView').innerHTML=dates.map(date=>{
const jobs=bd[date];const d=new Date(date);const dn=dw[d.getDay()];
const offs=new Set();jobs.forEach(j=>j.doff.forEach(n=>offs.add(n)));
const offHtml=offs.size?'<div style="margin-bottom:8px">'+[...offs].map(n=>'<span class="badge off">'+n+' 휴무</span>').join(' ')+'</div>':'';

const teamJobs={};const unassigned=[];
jobs.forEach(j=>{const t=A[j.id];if(t){const k=t.join('+');if(!teamJobs[k])teamJobs[k]={team:t,jobs:[]};teamJobs[k].jobs.push(j)}else unassigned.push(j)});

let tHtml=Object.values(teamJobs).map(tg=>{
const ti=getTeamIdx(tg.team[0]);const tc=getTeamColor(ti);
const jHtml=tg.jobs.map(j=>{
const mats=j.mat.map(m=>'<span class="badge '+(m.t==='마블'?'marble':m.t==='코튼'?'cotton':'modern')+'">'+m.t+m.q+'</span>').join('');
const distH=j.dist?'<span class="badge km">'+j.dist+'km</span>':'';
return '<div class="tm-job"><span class="badge '+(j.time==='오전'||j.time.includes('2:')?'am':'pm')+'">'+j.time+'</span> '+j.addr+'/'+j.scope+' '+mats+distH+'</div>'}).join('');
return '<div class="tm"><div class="tm-name tc'+tc+'">'+tg.team.join(' ')+'</div>'+jHtml+'</div>'}).join('');

if(unassigned.length){
tHtml+='<div class="un-box"><div class="un-title">⚠️ 미배정</div>'+unassigned.map(j=>{
return '<div class="tm-job"><span class="badge '+(j.time==='오전'?'am':'pm')+'">'+j.time+'</span> '+j.addr+'/'+j.scope+'</div><div style="display:flex;flex-wrap:wrap;gap:4px;margin:4px 0 8px">'+E.map(e=>{
const isOff=j.doff.includes(e);return '<button class="ebtn'+(isOff?' off':'')+'" onclick="ma(\''+j.id+'\',\''+e+'\')">'+e+'</button>'}).join('')+'</div>'}).join('')+'</div>'}

return '<div class="day-card"><div class="day-hdr"><span class="day-dt">'+date.slice(2).replace(/-/g,'')+'</span><span class="day-dw">'+dn+'</span></div>'+offHtml+tHtml+'</div>'}).join('')}

function ma(id,emp){A[id]=[emp];ss();render();toast('✅ 배정완료')}

// ====== 팀 설정 ======
function renderTeam(){
const colors=['tc0','tc1','tc2','tc3'];
const colorsL=['tc0l','tc1l','tc2l','tc3l'];

let html='<div class="sec-title">👥 이번 달 팀 구성</div>';
html+='<p style="font-size:12px;color:var(--text2);margin-bottom:14px">팀을 구성하면 한 달간 같은 팀으로 운영됩니다. 직원을 눌러 팀에 추가하세요.</p>';

// 현재 팀 표시
if(teams.length){
html+=teams.map((t,i)=>{
const members=t.map(m=>'<span class="team-slot-member '+colors[i%4]+'">'+m+'<span class="x" onclick="removeMember('+i+',\''+m+'\')">×</span></span>').join('');
return '<div class="team-card"><div class="team-title" style="display:flex;justify-content:space-between;align-items:center"><span>'+String(i+1)+'팀</span><button style="background:none;border:1px solid rgba(248,113,113,.3);color:var(--red);padding:4px 12px;border-radius:6px;font-size:11px;cursor:pointer;font-family:var(--font)" onclick="delTeam('+i+')">삭제</button></div><div class="team-slot">'+members+(t.length===0?'<span style="color:var(--text2);font-size:12px">비어있음</span>':'')+'</div></div>'}).join('')}

// 미배정 직원
const assigned=new Set();teams.forEach(t=>t.forEach(m=>assigned.add(m)));
const unassigned=E.filter(e=>!assigned.has(e));

if(unassigned.length){
html+='<div class="team-card"><div class="team-title">미배정 직원</div><div class="member-pool">'+unassigned.map(e=>'<div class="member tc0l" onclick="assignToTeam(\''+e+'\')">'+e+'</div>').join('')+'</div></div>'}

html+='<div style="display:flex;gap:8px;margin-top:12px"><button class="btn btn-blue" onclick="addTeam()" style="flex:1">+ 새 팀 추가</button><button class="btn btn-green" onclick="autoAssign()" style="flex:1">🤖 자동 배정</button></div>';

// 직원 관리
html+='<div style="margin-top:24px"><div class="sec-title">👷 직원 관리</div><div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px">'+E.map((e,i)=>'<span class="badge" style="padding:6px 12px;font-size:12px;background:var(--bg3);color:var(--text)">'+e+' <span style="cursor:pointer;color:var(--red);margin-left:4px" onclick="delEmp(\''+e+'\')">×</span></span>').join('')+'</div><div class="add-row" style="display:flex;gap:8px"><input id="ne" placeholder="새 직원 이름" style="flex:1;padding:10px;background:var(--bg3);border:1px solid var(--border);color:var(--text);border-radius:8px;font-family:var(--font);outline:none"><button class="btn btn-blue" style="width:auto;padding:10px 20px" onclick="addEmp()">추가</button></div></div>';

document.getElementById('teamView').innerHTML=html}

function addTeam(){teams.push([]);sv();ss();renderTeam()}
function delTeam(i){if(!confirm((i+1)+'팀 삭제?'))return;teams.splice(i,1);sv();ss();renderTeam()}
function assignToTeam(emp){
if(!teams.length){teams.push([]);} 
// 가장 인원 적은 팀에 자동 배정
let minIdx=0;let minLen=teams[0].length;
teams.forEach((t,i)=>{if(t.length<minLen){minLen=t.length;minIdx=i}});
teams[minIdx].push(emp);sv();ss();renderTeam()}
function removeMember(ti,name){teams[ti]=teams[ti].filter(m=>m!==name);sv();ss();renderTeam()}
function addEmp(){const n=document.getElementById('ne');const v=n.value.trim();if(!v||E.includes(v))return;E.push(v);n.value='';sv();renderTeam();toast(v+' 추가!')}
function delEmp(n){if(!confirm(n+' 삭제?'))return;E=E.filter(e=>e!==n);teams=teams.map(t=>t.filter(m=>m!==n));sv();ss();renderTeam()}

// ====== 공정성 ======
function renderFair(){
const es={};E.forEach(e=>es[e]={d:0,c:0});
J.forEach(j=>{const t=A[j.id];if(t)t.forEach(e=>{if(es[e]){es[e].d+=j.dist||0;es[e].c++}})});
const md=Math.max(...Object.values(es).map(s=>s.d),1);const mc=Math.max(...Object.values(es).map(s=>s.c),1);
const cl=['var(--blue)','var(--green)','var(--yellow)','var(--pink)','var(--purple)','var(--orange)'];
const dists=E.map(e=>es[e].d);const avg=dists.reduce((a,b)=>a+b,0)/dists.length||0;
const mxd=Math.max(...dists.map(d=>Math.abs(d-avg)),0);const sc=avg>0?Math.max(0,Math.round(100-mxd/avg*100)):100;
const hasDist=dists.some(d=>d>0);

// 팀 조합 횟수
const pc={};
J.forEach(j=>{const t=A[j.id];if(t&&t.length>=2){const key=[...t].sort().join('+');pc[key]=(pc[key]||0)+1}});

document.getElementById('fairView').innerHTML=
'<div class="fair-card"><div class="score"><div class="score-label">공정성 점수</div><div class="score-num" style="color:'+(sc>=80?'var(--green)':sc>=60?'var(--yellow)':'var(--red)')+'">'+sc+'<span style="font-size:18px">점</span></div><div class="score-label">거리 편차 '+Math.round(mxd)+'km</div></div></div>'+
(hasDist?'<div class="fair-card"><div class="sec-title">📏 총 이동거리</div>'+E.map((e,i)=>{const s=es[e];const w=Math.round(s.d/md*100);return '<div class="fair-row"><span class="fair-name">'+e+'</span><div class="fair-bar"><div class="fair-fill" style="width:'+Math.max(w,5)+'%;background:'+cl[i%6]+'">'+s.d+'</div></div><span class="fair-val">'+s.d+'km</span></div>'}).join('')+'</div>':'<div class="fair-card"><div style="color:var(--text2);font-size:12px">자동 배정 후 거리가 표시됩니다</div></div>')+
'<div class="fair-card"><div class="sec-title">📊 시공 건수</div>'+E.map((e,i)=>{const s=es[e];const w=Math.round(s.c/mc*100);return '<div class="fair-row"><span class="fair-name">'+e+'</span><div class="fair-bar"><div class="fair-fill" style="width:'+Math.max(w,5)+'%;background:'+cl[i%6]+'">'+s.c+'</div></div><span class="fair-val">'+s.c+'건</span></div>'}).join('')+'</div>'+
'<div class="fair-card"><div class="sec-title">🤝 팀 조합 횟수</div>'+(Object.keys(pc).length?Object.entries(pc).sort((a,b)=>b[1]-a[1]).map(([k,v])=>'<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border);font-size:13px"><span>'+k.replace(/\+/g,' + ')+'</span><span style="font-weight:700">'+v+'회</span></div>').join(''):'<div style="color:var(--text2);font-size:12px">배정 후 표시됩니다</div>')+'</div>'}

// ====== 공통 ======
function sw(n){document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));document.querySelectorAll('.pane').forEach(p=>p.classList.remove('on'));document.getElementById('p-'+n).classList.add('on');const ts=['cal','list','team','fair'];document.querySelectorAll('.tab')[ts.indexOf(n)].classList.add('on');render()}
function render(){renderCal();renderList();renderTeam();renderFair()}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.style.display='block';setTimeout(()=>t.style.display='none',2000)}

async function init(){
await sl();
try{const r=await fetch(CSV);const t=await r.text();parseCSV(t);document.getElementById('sub').textContent='✅ '+J.length+'건 · '+E.length+'명 · '+teams.length+'팀'}
catch(e){document.getElementById('sub').textContent='⚠️ '+e.message}
render()}
init();
</script>
</body>
</html>
